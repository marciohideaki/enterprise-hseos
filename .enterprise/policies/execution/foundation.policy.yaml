version: 1
kind: structural_execution_policy
name: foundation
description: Default enterprise execution governance pack for HSEOS runtime mutation flows.

defaults:
  fail_closed: true

modules:
  allow: []
  deny: []
  max_count: 12

tools:
  allow: []
  deny: []
  hidden: []
  max_count: 8

paths:
  allowed_roots: []
  denied_patterns:
    - ".."
    - "/.git/"
    - "/node_modules/"

custom_content:
  allow: true
  max_sources: 4

missions:
  types:
    allow: []
    deny: []
  priorities:
    allow: []
    deny: []
  owners:
    allow: []
    deny: []
  labels:
    allow: []
    deny: []
  dependencies:
    allow: []
    deny: []
  retry_classes:
    allow:
      - none
      - transient
      - manual
      - policy
    deny: []
  require_owner_for_priorities:
    - critical
  require_deadline_for_priorities:
    - critical
  require_labels_for_retry_classes:
    transient:
      - runtime
      - remediation
    policy:
      - governance
  require_dependencies_for_retry_classes:
    policy:
      - policy-baseline

budgets:
  max_total_selections: 16

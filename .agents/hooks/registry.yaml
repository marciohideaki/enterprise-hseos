version: "1.1"
schema_version: "1.0"
source: .claude/hooks.json
handlers_dir: .agents/hooks/handlers
# Wave 4 foundation: registry now declares pending entries for the eight
# hooks scheduled for internalization from ~/.claude/hooks/. Concrete
# handler scripts land in .agents/hooks/handlers/ in W4 implementation
# follow-up commits. Status field per entry distinguishes:
#   active           -- compiled to .claude/hooks.json today
#   pending          -- declared for migration; handler script not yet present
#   deprecated       -- removed from active set; kept for audit
hooks:
  - id: pretooluse-agent-hseos-swarm-gate-bloqueia-agent-paralelo-sem-run-dev-squad-ativo-complementa-gate-global
    event: PreToolUse
    matcher: Agent
    type: command
    command: bash $(git rev-parse --show-toplevel 2>/dev/null)/scripts/governance/swarm-gate.sh
    timeout: 5
    blocking: true
    description: "HSEOS SWARM gate: bloqueia Agent paralelo sem run dev-squad ativo (complementa gate global)"
    platform_support:
      - claude-code
    fallback: Use repository scripts or quality gates when the target platform has no native hook event.
  - id: pretooluse-edit-backup-file-before-any-edit-operation
    event: PreToolUse
    matcher: Edit
    type: command
    command: if [[ -f "$CLAUDE_TOOL_FILE_PATH" ]]; then cp "$CLAUDE_TOOL_FILE_PATH" "$CLAUDE_TOOL_FILE_PATH.bak.$(date +%s)" 2>/dev/null || true; fi
    timeout: null
    blocking: true
    description: Backup file before any Edit operation
    platform_support:
      - claude-code
    fallback: Use repository scripts or quality gates when the target platform has no native hook event.
  - id: pretooluse-bash-warn-on-high-risk-bash-commands
    event: PreToolUse
    matcher: Bash
    type: command
    command: if echo "$CLAUDE_TOOL_COMMAND" | grep -qE '^(git push|git reset --hard|rm -rf|git branch -[Dd])'; then echo '[HSEOS] High-risk command intercepted — confirm this is intentional' >&2; fi
    timeout: null
    blocking: true
    description: Warn on high-risk bash commands
    platform_support:
      - claude-code
    fallback: Use repository scripts or quality gates when the target platform has no native hook event.
  - id: posttooluse-edit-auto-format-python-black-and-js-ts-prettier-after-edit
    event: PostToolUse
    matcher: Edit
    type: command
    command: FILE="$CLAUDE_TOOL_FILE_PATH"; if [[ "$FILE" == *.py ]] && command -v black &>/dev/null; then black "$FILE" 2>/dev/null || true; elif [[ "$FILE" == *.js || "$FILE" == *.ts || "$FILE" == *.jsx || "$FILE" == *.tsx ]] && command -v prettier &>/dev/null; then prettier --write "$FILE" 2>/dev/null || true; fi
    timeout: null
    blocking: false
    description: Auto-format Python (black) and JS/TS (prettier) after Edit
    platform_support:
      - claude-code
    fallback: Use repository scripts or quality gates when the target platform has no native hook event.
  - id: posttooluse-all-emit-agent-state-tool-call-event-best-effort-non-blocking
    event: PostToolUse
    matcher: "*"
    type: command
    command: CLAUDE_HOOK_EVENT=PostToolUse bash $(git rev-parse --show-toplevel 2>/dev/null)/scripts/governance/state-emit-hook.sh PostToolUse "$CLAUDE_TOOL_NAME" 2>/dev/null || true
    timeout: null
    blocking: false
    description: Emit agent-state tool_call event (best-effort, non-blocking)
    platform_support:
      - claude-code
    fallback: Use repository scripts or quality gates when the target platform has no native hook event.
  - id: sessionstart-all-display-hseos-navigation-reminder-at-session-start
    event: SessionStart
    matcher: "*"
    type: command
    command: "echo '--- HSEOS SESSION START ---' && echo 'Constitution: .enterprise/.specs/constitution/Enterprise-Constitution.md' && echo 'Skills: .enterprise/governance/agent-skills/SKILLS-REGISTRY.md' && echo 'Agents: .hseos/AGENT-MANIFEST.md' && echo 'Branch:' $(git branch --show-current 2>/dev/null || echo 'unknown') && echo '--- READ CLAUDE.md BEFORE ANY ACTION ---'"
    timeout: null
    blocking: false
    description: Display HSEOS navigation reminder at session start
    platform_support:
      - claude-code
    fallback: Use repository scripts or quality gates when the target platform has no native hook event.
  - id: sessionstart-all-emit-agent-state-start-event-best-effort-non-blocking
    event: SessionStart
    matcher: "*"
    type: command
    command: CLAUDE_HOOK_EVENT=SessionStart bash $(git rev-parse --show-toplevel 2>/dev/null)/scripts/governance/state-emit-hook.sh SessionStart 2>/dev/null || true
    timeout: null
    blocking: false
    description: Emit agent-state start event (best-effort, non-blocking)
    platform_support:
      - claude-code
    fallback: Use repository scripts or quality gates when the target platform has no native hook event.
  - id: stop-all-emit-agent-state-complete-event-when-claude-session-ends-best-effort-non-blocking
    event: Stop
    matcher: "*"
    type: command
    command: CLAUDE_HOOK_EVENT=Stop bash $(git rev-parse --show-toplevel 2>/dev/null)/scripts/governance/state-emit-hook.sh Stop 2>/dev/null || true
    timeout: null
    blocking: false
    status: active
    description: Emit agent-state complete event when Claude session ends (best-effort, non-blocking)
    platform_support:
      - claude-code
    fallback: Use repository scripts or quality gates when the target platform has no native hook event.

  # ---------------------------------------------------------------------------
  # Internalized handlers (Wave 4 implementation slice complete).
  # All eight handler scripts live at .agents/hooks/handlers/ and pass the
  # integration suite at test/test-hook-handlers.js (68 assertions).
  # Status flipped from pending → active in W4-T9 (this commit).
  # ---------------------------------------------------------------------------
  - id: posttooluse-write-edit-plan-lint-validate-execution-protocol-section
    event: PostToolUse
    matcher: Write|Edit
    type: command
    command: bash .agents/hooks/handlers/plan-lint.sh "$CLAUDE_TOOL_FILE_PATH"
    timeout: null
    blocking: false
    status: active
    description: Lint plan files for missing Execution Protocol section in parallel-flow plans
    platform_support:
      - claude-code
    fallback: Manual review during PR.

  - id: precompact-snapshot-critical-context-before-claude-compaction
    event: PreCompact
    matcher: "*"
    type: command
    command: bash .agents/hooks/handlers/pre-compact.sh
    timeout: 10
    blocking: false
    status: active
    description: Snapshot critical context (next steps, open questions) before compaction
    platform_support:
      - claude-code
    fallback: Manual context export prior to /compact.

  - id: userpromptsubmit-on-prompt-submit-project-scoped-state-injection
    event: UserPromptSubmit
    matcher: "*"
    type: command
    command: bash .agents/hooks/handlers/on-prompt-submit.sh
    timeout: 5
    blocking: false
    status: active
    description: Project-scoped prompt logging and state injection (vault concerns stripped vs upstream)
    platform_support:
      - claude-code
    fallback: No-op when handler absent.

  - id: sessionend-on-session-end-gated-vault-sync
    event: SessionEnd
    matcher: "*"
    type: command
    command: bash .agents/hooks/handlers/session-end.sh
    timeout: null
    blocking: false
    status: active
    description: Session-end log; vault sync only when second_brain.enabled true
    platform_support:
      - claude-code
    fallback: No-op when handler absent.

  - id: pretooluse-agent-suggest-skill-before-agent-dispatch
    event: PreToolUse
    matcher: Agent
    type: command
    command: bash .agents/hooks/handlers/suggest-skill.sh
    timeout: 5
    blocking: false
    status: active
    description: Recommend skills before Agent spawn based on SKILL.md frontmatter triggers
    platform_support:
      - claude-code
    fallback: Manual skill selection.

  - id: pretooluse-grep-glob-code-index-guard
    event: PreToolUse
    matcher: Grep|Glob
    type: command
    command: bash .agents/hooks/handlers/code-index-guard.sh "$CLAUDE_TOOL_NAME"
    timeout: 3
    blocking: true
    status: active
    description: Block raw search when a code index (axon, etc.) is available; pluggable across providers
    platform_support:
      - claude-code
    fallback: No-op when no code index is configured.

  - id: posttooluse-write-edit-code-index-post-edit-reindex
    event: PostToolUse
    matcher: Write|Edit
    type: command
    command: bash .agents/hooks/handlers/code-index-post-edit.sh "$CLAUDE_TOOL_FILE_PATH"
    timeout: null
    blocking: false
    status: active
    description: Trigger index reindex after edits; pluggable across code-index providers
    platform_support:
      - claude-code
    fallback: Manual reindex via provider CLI.

  - id: notification-on-notification-system-toast-for-long-operations
    event: Notification
    matcher: "*"
    type: command
    command: bash .agents/hooks/handlers/on-notification.sh "$CLAUDE_NOTIFICATION_MESSAGE"
    timeout: 5
    blocking: false
    status: active
    description: System notification for long-running operations (cross-platform — toast/bell)
    platform_support:
      - claude-code
    fallback: Terminal bell.

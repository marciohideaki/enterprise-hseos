version: "1.0"
component_families:
  - baseline
  - runtime
  - capability
  - adapter
  - skill
  # extras: host-side installer conveniences — pure opt-in, never part of any
  # profile; selecting one maps to the corresponding `hseos install` flag.
  - extra

hook_profiles:
  advisory:
    description: Warn-only hooks and portable metadata. Use for first install or teams evaluating HSEOS.
    blocking_default: false
  standard:
    description: Default development hooks with state emission and targeted blocking gates.
    blocking_default: mixed
  strict:
    description: Governance-heavy local execution with branch, plan, Agent, and safety gates.
    blocking_default: mixed
  ci:
    description: CI and release posture. Local warnings remain readable while required repository gates enforce failure.
    blocking_default: true

components:
  - id: baseline:governance
    family: baseline
    name: Governance Baseline
    required: true
    description: Constitution, policies, standards, ADRs, agent authority, and governance docs.
    modules: []
    tools: []
    install_paths:
      - .enterprise/
      - .hseos/config/hseos.config.yaml

  - id: baseline:entrypoints
    family: baseline
    name: Agent Entrypoints
    required: true
    description: Portable project instructions and runtime-specific entrypoints.
    modules: []
    tools:
      - codex
      - claude-code
    install_paths:
      - AGENTS.md
      - CLAUDE.md
      - .agents/instructions/

  - id: baseline:skills-registry
    family: baseline
    name: Skills Registry
    required: true
    description: Governed skill registry plus Tier 1 and Tier 2 skill files.
    modules: []
    tools: []
    install_paths:
      - .enterprise/governance/agent-skills/
      - .agents/skills/

  - id: runtime:hooks
    family: runtime
    name: Hook Runtime
    description: Neutral hook registry, handlers, generated adapter hooks, and fallback metadata.
    modules: []
    tools:
      - claude-code
      - codex
    install_paths:
      - .agents/hooks/
      - .claude/hooks.json
      - .codex/hseos-hooks.json

  - id: runtime:state
    family: runtime
    name: Project State
    description: SQLite-backed run, task, event, handoff, and kanban state.
    modules: []
    tools: []
    install_paths:
      - .hseos/state/
      - tools/mcp-project-state/

  - id: runtime:workflows
    family: runtime
    name: Workflow Registry
    description: Delivery, release, runtime, and readiness workflow definitions.
    modules: []
    tools: []
    install_paths:
      - .hseos/workflows/

  - id: runtime:mcp
    family: runtime
    name: MCP Runtime
    description: Project-local MCP bundles, governance tools, swarm tools, state tools, and code-index bridge.
    prerequisites:
      - "axon-bridge proxies an external `axon` binary — degrades to no-op fallback results when the binary is absent"
      - "enterprise-tier MCP bundle (github, postgres, kubernetes, sentry, azure-devops) requires secrets via environment variables (ADR-0008)"
    modules: []
    tools:
      - codex
      - claude-code
    install_paths:
      - .agents/mcp/
      - tools/mcp-hseos-governance/
      - tools/mcp-hseos-swarm/
      - tools/mcp-project-state/
      - tools/mcp-axon-bridge/

  - id: capability:architecture
    family: capability
    name: Architecture Governance
    description: ADR compliance, boundary checks, breaking-change detection, RFC, and naming governance.
    skills:
      - adr-compliance
      - architecture-breaking-change-detection
      - architecture-ddd-boundary-check
      - naming-conventions
      - rfc

  - id: capability:delivery
    family: capability
    name: Delivery Execution
    description: Production-oriented goal/loop execution, spec-driven delivery, dev-squad, multi-agent orchestration, inter-agent communication, release control, PR review, commit hygiene, and test coverage.
    skills:
      - hseos-goal-loop
      - spec-driven
      - dev-squad
      - multi-agent-orchestration
      - inter-agent-comms
      - release-control
      - pr-review
      - commit-hygiene
      - sanitize-comments
      - test-coverage

  - id: capability:security
    family: capability
    name: Security and Supply Chain
    description: Secure coding, dependency audit, threat modeling, policy layer, and plain-language security reporting.
    skills:
      - secure-coding
      - dependency-audit
      - threat-modeling
      - policy-layer
      - security-audit-plain-language

  - id: capability:knowledge
    family: capability
    name: Knowledge and Documentation
    description: Documentation completeness, project docs, second-brain integration, context engineering and policy, and session handoff.
    prerequisites:
      - "second-brain skill degrades gracefully without a vault (`vault_required: false`, ADR-0006 P6); vault integration is opt-in via `hseos install --second-brain-path <path>`"
    skills:
      - doc-project
      - documentation-completeness
      - second-brain
      - context-engineering
      - context-compression
      - context-policy
      - session-handoff

  - id: capability:observability
    family: capability
    name: AI Observability
    description: AI observability, telemetry compliance, project state, and performance profiling.
    prerequisites:
      - "OTLP/Loki telemetry export hooks stay inert unless `OTEL_EXPORTER_OTLP_ENDPOINT` (and Loki equivalents) are set — opt-in per ADR-0014; SQLite remains the canonical sink"
    skills:
      - ai-observability
      - observability-compliance
      - project-state
      - performance-profiling

  - id: capability:gitops
    family: capability
    name: GitOps Operations
    description: GitOps project creation, service onboarding, deployment, and runtime verification.
    prerequisites:
      - "gitops-deploy requires admin agent mode (`metadata.hseos.required_modes: [admin]`) — never auto-activates in read-only/write-safe sessions"
      - "real deployments additionally require kubectl and ArgoCD access in the operator environment"
    skills:
      - gitops-new-project
      - gitops-add-service
      - gitops-deploy

  - id: capability:ado
    family: capability
    name: ADO Operations
    description: Azure DevOps planning, sync, project creation, wave closeout, and operational automation.
    prerequisites:
      - "requires `ado.enabled: true` in `.hseos/config/hseos.config.yaml` plus an `ADO_PAT` token in the environment (ADR-0011)"
      - "every ADO hook and skill exits silently (no-op) while the feature flag is off — safe to install without the prerequisite"
    skills:
      - ado-plan
      - ado-sync
      - ado-new-project
      - ado-close-wave
      - ado-ops

  - id: capability:sandbox
    family: capability
    name: Agent Sandboxing
    description: Optional OS-level sandbox planning and policy alignment.
    prerequisites:
      - "OS-level sandboxing requires the external `ai-jail` binary (bubblewrap/user namespaces on Linux) — not vendored; `hseos sandbox doctor` reports readiness (ADR-0012)"
      - "degrades to no-op when the binary is absent (`sandbox.required: false` by default)"
    skills:
      - agent-permissions
      - mcp-governance

  - id: capability:readiness
    family: capability
    name: Enterprise Readiness
    description: Enterprise readiness, accessibility compliance, core drift, and self-verification checks.
    skills:
      - enterprise-readiness-audit
      - accessibility
      - core-drift
      - self-verification
      - verification-before-completion

  - id: capability:solo
    family: capability
    name: Solo Execution
    description: Compact implementation flow for BLITZ with simplicity, systematic debugging, and completion checks.
    skills:
      - simplicity-first
      - systematic-debugging
      - verification-before-completion

  - id: capability:verification
    family: capability
    name: Verification
    description: Verification before completion, self-verification, test coverage, and quality evidence.
    skills:
      - verification-before-completion
      - self-verification
      - test-coverage

  - id: capability:research
    family: capability
    name: Research and Evaluation
    description: Technology research with grounded recommendations and repository evaluation via repo-radar.
    prerequisites:
      - "repo-radar uses the Axon code index when available and degrades to Read+Grep exploration without it"
    skills:
      - repo-radar
      - tech-research

  - id: extra:rtk
    family: extra
    name: RTK Token Optimizer
    description: CLI command interception that reduces LLM token usage by 60-90%. Maps to `hseos install --rtk`.
    prerequisites:
      - "downloads an external binary from GitHub at install time"
      - "PATCHES the USER-GLOBAL Claude Code settings file outside this repository (Claude Code only; cross-project side effect — review before enabling)"
    install_paths: []

  - id: extra:usage-dashboard
    family: extra
    name: Usage Analytics Dashboard
    description: Cost/usage analytics dashboard on port 8080. Maps to `hseos install --usage-dashboard [local|docker]`.
    prerequisites:
      - "Python 3 (local mode, default) or Docker Compose (docker mode)"
      - "the dashboard binds to the local network deliberately (:8080) — not loopback-only"
    install_paths:
      - tools/usage-dashboard/

  - id: extra:second-brain
    family: extra
    name: Second-Brain Vault Integration
    description: Knowledge-vault sync for decisions/learnings. Maps to `hseos install --second-brain-path <path>`.
    prerequisites:
      - "an existing second-brain vault; the path must be supplied via --second-brain-path (the component only signals intent)"
      - "all vault-touching skills degrade gracefully without it (`vault_required: false`, ADR-0006 P6)"
    install_paths: []

  - id: extra:git-hooks
    family: extra
    name: Git Pre-Commit Hook
    description: Wires scripts/governance/quality-gates.sh into .git/hooks/pre-commit. Installed by default in git repos; `--no-git-hooks` skips.
    prerequisites:
      - "a git working tree (skipped silently when .git/ is absent); existing hooks are never overwritten"
    install_paths: []

  - id: adapter:codex
    family: adapter
    name: Codex Adapter
    description: AGENTS.md, Codex config, MCP config, and portable hook metadata for Codex.
    tools:
      - codex
    install_paths:
      - AGENTS.md
      - .codex/config.toml
      - .codex/hseos-hooks.json

  - id: adapter:claude-code
    family: adapter
    name: Claude Code Adapter
    description: CLAUDE.md pointer, commands, hooks, skills, MCP config, and status surface for Claude Code.
    tools:
      - claude-code
    install_paths:
      - CLAUDE.md
      - .claude/hooks.json
      - .claude/commands/

  - id: adapter:goose
    family: adapter
    name: Goose Adapter
    description: Portable adapter metadata for Goose-compatible agent execution.
    install_paths:
      - .agents/adapters/goose.yaml

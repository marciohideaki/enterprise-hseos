version: "1.0"
id: goose
description: "Adapter for Goose (Block / LF AAIF reference AI coding tool)"
implementation: tools/cli/installers/lib/core/agent-core-compiler/adapters/goose.js
capabilities:
  hooks:
    events: []
    matchers: []
    note: "Goose does not support hooks natively; hook metadata written to .goose/hooks-metadata.json as advisory"
  subagents:
    native: false
    format: "Goose uses toolset plugins; subagent patterns documented in .goose/agents/"
  slash_commands:
    native: true
    location: .goose/skills/
    format: markdown
  mcp:
    transport: stdio
    config: .goose/config.yaml
  statusline:
    native: false
  settings:
    location: .goose/config.yaml
    schema: yaml
output:
  entrypoint: .goose/config.yaml
  files:
    - { type: config,    path: .goose/config.yaml,          generated: true,  mergeable: false }
    - { type: skills,    path: .goose/skills/,               generated: true,  mergeable: true }
    - { type: agents,    path: .goose/agents/,               generated: true,  mergeable: true }
    - { type: hooks_meta, path: .goose/hooks-metadata.json, generated: true,  mergeable: false }
fallbacks:
  unsupported_capability: "Goose does not support hooks; hook intent documented in .goose/hooks-metadata.json for manual implementation"

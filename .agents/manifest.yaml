    capabilities:
      - code_search
      - dep_graph
      - memory_search
      - get_skeleton
      - get_overview
      - run_pipeline
  - id: fetch
    transport: stdio
    binary: "@modelcontextprotocol/server-fetch"
    runtime: npx
    bundle: extended
    capabilities:
      - fetch_url
  - id: filesystem
    transport: stdio
    binary: "@modelcontextprotocol/server-filesystem"
    runtime: npx
    bundle: core
    capabilities:
      - read_file
      - write_file
      - list_directory
      - search_files
  - id: hseos-governance
    transport: stdio
    binary: tools/mcp-hseos-governance/index.js
    runtime: node
    bundle: core
    capabilities:
      - query_constitution
      - validate_adr
      - check_authority
      - list_skills
      - list_workflows
  - id: hseos-state-tracking
    transport: stdio
    binary: tools/mcp-project-state/index.js
    runtime: node
    bundle: core
    capabilities:
      - read_state
      - write_state
      - list_runs
      - emit_event
      - search_events
  - id: hseos-swarm
    transport: stdio
    binary: tools/mcp-hseos-swarm/index.js
    runtime: node
    bundle: extended
    capabilities:
      - plan_squad
      - dispatch_wave
      - consolidate_handoff
      - get_run_state
      - list_runs
  - id: memory
    transport: stdio
    binary: "@modelcontextprotocol/server-memory"
    runtime: npx
    bundle: extended
    capabilities:
      - create_memory
      - search_memory
      - delete_memory
  - id: sequential-thinking
    transport: stdio
    binary: "@modelcontextprotocol/server-sequential-thinking"
    runtime: npx
    bundle: extended
    capabilities:
      - sequential_reasoning_step
      - branch_thought
      - revise_thought

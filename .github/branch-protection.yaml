# HSEOS Branch Protection Rules
# Authority: Enterprise Constitution > execution-governance
#
# Apply via GitHub CLI:
#   gh api repos/{owner}/{repo}/branches/main/protection --method PUT --input .github/branch-protection.yaml
#
# Or via Terraform/GitOps — see .enterprise/ci-cd/ for pipeline integration

version: 1

branches:
  - name: main
    protection:
      required_status_checks:
        strict: true
        contexts:
          - "quality-gates"
          - "validate-commit-messages"
      enforce_admins: false
      required_pull_request_reviews:
        dismiss_stale_reviews: true
        require_code_owner_reviews: false
        required_approving_review_count: 1
        require_last_push_approval: true
      restrictions: null
      allow_force_pushes: false
      allow_deletions: false
      block_creations: false

  - name: develop
    protection:
      required_status_checks:
        strict: true
        contexts:
          - "quality-gates"
      enforce_admins: false
      required_pull_request_reviews:
        dismiss_stale_reviews: true
        required_approving_review_count: 1
      restrictions: null
      allow_force_pushes: false
      allow_deletions: false

# Branch naming policy (enforced via pre-commit hook)
branch_naming:
  protected:
    - main
    - master
    - develop
  allowed_patterns:
    - "feature/*"
    - "task/*"
    - "fix/*"
    - "hotfix/*"
    - "release/*"
    - "docs/*"
    - "chore/*"
    - "ci/*"
  enforcement: "scripts/governance/check-branch.sh"

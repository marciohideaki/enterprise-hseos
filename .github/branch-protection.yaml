# HSEOS Branch Protection Rules
# Authority: Enterprise Constitution > execution-governance
#
# Desired state for repository automation.
# Do not pass this wrapper file directly to the GitHub branch protection REST API.
# Apply with:
#   node scripts/governance/apply-branch-protection.js --branch master
#
# Or via Terraform/GitOps — see .enterprise/ci-cd/ for pipeline integration

version: 1

branches:
  - name: master
    protection:
      required_status_checks:
        strict: true
        contexts:
          - "test (20.x)"
          - "test (22.x)"
          - "Standalone clean-env smoke (node:20)"
          # ci.yaml calls this job "the non-bypassable PR-time enforcement point"
          # (ADR-0015 Gate 7) — it must therefore be a required check.
          - "governance"
      enforce_admins: false
      required_pull_request_reviews:
        dismiss_stale_reviews: true
        require_code_owner_reviews: false
        required_approving_review_count: 1
        require_last_push_approval: true
      restrictions: null
      allow_force_pushes: false
      allow_deletions: false
      block_creations: false

# Branch naming policy (enforced via pre-commit hook)
branch_naming:
  protected:
    - main
    - master
    - develop
  allowed_patterns:
    - "feature/*"
    - "task/*"
    - "fix/*"
    - "hotfix/*"
    - "release/*"
    - "docs/*"
    - "chore/*"
    - "ci/*"
  enforcement: "scripts/governance/check-branch.sh"

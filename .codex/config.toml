[features]
rmcp_client = true

[mcp_servers."hseos-governance"]
command = "node"
args = ["tools/mcp-hseos-governance/index.js"]
enabled = true
startup_timeout_sec = 20

[mcp_servers."hseos-state-tracking"]
command = "node"
args = ["tools/mcp-project-state/index.js"]
enabled = true
startup_timeout_sec = 20

[mcp_servers."hseos-state-tracking".env]
HSEOS_STATE_DB = ".hseos/state/project.db"

[mcp_servers."filesystem"]
command = "npx"
args = ["@modelcontextprotocol/server-filesystem", "."]
enabled = true
startup_timeout_sec = 20
